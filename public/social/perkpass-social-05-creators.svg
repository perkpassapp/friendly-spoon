<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1080" viewBox="0 0 1080 1080" role="img" aria-labelledby="title desc">
  <title id="title">PerkPass creator collab social graphic</title>
  <desc id="desc">Square social post inviting local creators to tag PerkPass.</desc>
  <rect width="1080" height="1080" fill="#e9e2cf"/>
  <circle cx="190" cy="206" r="128" fill="#5fa061" opacity="0.22"/>
  <circle cx="892" cy="850" r="174" fill="#f0bd57" opacity="0.32"/>
  <rect x="68" y="68" width="944" height="944" rx="46" fill="#1a2e1a"/>
  <text x="110" y="146" font-family="Barlow Condensed, Arial Narrow, sans-serif" font-size="48" font-weight="900" letter-spacing="1" fill="#ffffff">Perk<tspan fill="#5fa061">Pass</tspan></text>
  <rect x="110" y="196" width="320" height="50" rx="25" fill="rgba(255,255,255,0.08)"/>
  <text x="136" y="230" font-family="Barlow Condensed, Arial Narrow, sans-serif" font-size="25" font-weight="900" letter-spacing="2" fill="#5fa061">CREATOR COLLAB</text>
  <text x="110" y="386" font-family="Barlow Condensed, Arial Narrow, sans-serif" font-size="112" font-weight="900" letter-spacing="-2.5" fill="#ffffff">FOODIES</text>
