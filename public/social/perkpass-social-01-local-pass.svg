<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1080" viewBox="0 0 1080 1080" role="img" aria-labelledby="title desc">
  <title id="title">PerkPass local pass social graphic</title>
  <desc id="desc">Square social post promoting PerkPass as a three dollar monthly pass to Philly perks.</desc>
  <rect width="1080" height="1080" fill="#e9e2cf"/>
  <circle cx="887" cy="165" r="122" fill="#5fa061" opacity="0.22"/>
  <circle cx="165" cy="900" r="156" fill="#f0bd57" opacity="0.36"/>
  <rect x="64" y="64" width="952" height="952" rx="44" fill="#f7f3ec" stroke="#1c1c1a" stroke-width="5"/>
  <text x="106" y="140" font-family="Barlow Condensed, Arial Narrow, sans-serif" font-size="48" font-weight="900" letter-spacing="1" fill="#1c1c1a">Perk<tspan fill="#5fa061">Pass</tspan></text>
  <rect x="106" y="182" width="240" height="46" rx="23" fill="#1a2e1a"/>
  <text x="132" y="214" font-family="Barlow Condensed, Arial Narrow, sans-serif" font-size="24" font-weight="800" letter-spacing="2" fill="#5fa061">BUILT FOR PHILLY</text>
  <text x="106" y="370" font-family="Barlow Condensed, Arial Narrow, sans-serif" font-size="120" font-weight="900" letter-spacing="-3" fill="#1c1c1a">YOUR $3/MO</text>
  <text x="106" y="485" font-family="Barlow Condensed, Arial Narrow, sans-serif" font-size="120" font-weight="900" letter-spacing="-3" fill="#1c1c1a">PASS TO</text>
  <text x="106" y="600" font-family="Barlow Condensed, Arial Narrow, sans-serif" font-size="120" font-weight="900" letter-spacing="-3" fill="#5fa061">LOCAL PERKS</text>
  <text x="110" y="670" font-family="Barlow, Arial, sans-serif" font-size="34" font-weight="700" fill="#3a3830">Restaurants, cafes, fitness, self-care, and neighborhood gems in one simple membership.</text>
  <g transform="translate(112 748)">
    <rect width="250" height="132" rx="18" fill="#ffffff" stroke="#000000" stroke-opacity="0.14" stroke-width="2"/>
    <text x="24" y="42" font-family="Barlow Condensed, Arial Narrow, sans-serif" font-size="23" font-weight="900" letter-spacing="1.4" fill="#9a9890">CAFE</text>
    <text x="24" y="82" font-family="Barlow, Arial, sans-serif" font-size="27" font-weight="800" fill="#3d7a3f">$2 off coffee</text>
  </g>
  <g transform="translate(398 748)">
    <rect width="250" height="132" rx="18" fill="#ffffff" stroke="#000000" stroke-opacity="0.14" stroke-width="2"/>
    <text x="24" y="42" font-family="Barlow Condensed, Arial Narrow, sans-serif" font-size="23" font-weight="900" letter-spacing="1.4" fill="#9a9890">LUNCH</text>
    <text x="24" y="82" font-family="Barlow, Arial, sans-serif" font-size="27" font-weight="800" fill="#3d7a3f">Member deals</text>
  </g>
  <g transform="translate(684 748)">
    <rect width="250" height="132" rx="18" fill="#ffffff" stroke="#000000" stroke-opacity="0.14" stroke-width="2"/>
    <text x="24" y="42" font-family="Barlow Condensed, Arial Narrow, sans-serif" font-size="23" font-weight="900" letter-spacing="1.4" fill="#9a9890">LOCAL</text>
    <text x="24" y="82" font-family="Barlow, Arial, sans-serif" font-size="27" font-weight="800" fill="#3d7a3f">New favorites</text>
  </g>
  <text x="106" y="960" font-family="Barlow Condensed, Arial Narrow, sans-serif" font-size="34" font-weight="900" letter-spacing="1.6" fill="#1c1c1a">GETPERKPASS.COM</text>
</svg>
